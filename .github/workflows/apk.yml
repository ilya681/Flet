name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ۱. تنظیم نسخه پایتون (استفاده از نسخه پایدار ۳.۱۱)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ۲. به‌روزرسانی pip و نصب وابستگی‌ها (بدون پکیج اشتباه flet-build)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ۳. اسکن امنیتی با Bandit (برای اینکه هم یاد بگیری و هم کدت امن باشه)
      - name: Security Scan with Bandit
        run: |
          echo "Running Security Scan..."
          # استفاده از || true باعث میشه اگر باگ امنیتی پیدا کرد، کل بیلد متوقف نشه و فقط گزارش بده
          bandit -r . -ll || echo "Bandit found some issues, but continuing build..."

      # ۴. تنظیم محیط جاوا (الزامی برای بیلد اندروید)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ۵. تنظیم محیط Flutter (قلب تپنده بیلد Flet)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # ۶. مرحله اصلی بیلد APK
      # چون main.py در ریشه است، دستور زیر دقیق‌ترین حالت ممکن است
      - name: Build APK
        run: flet build apk

      # ۷. ذخیره فایل نهایی برای دانلود
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyIliyaApp-Release
          path: build/apk/*.apk
