name: Build and Secure Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # به‌روزرسانی pip برای جلوگیری از مشکلات نصب
      - name: Upgrade pip and Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-build bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # اسکن امنیتی (اگر فایل پایتون تو خیلی ساده است، ممکنه اینجا خطا نده)
      - name: Security Scan with Bandit
        run: bandit -r . -ll || echo "Bandit scan finished with findings"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # مرحله بیلد: اضافه کردن --no-pub برای جلوگیری از دانلودهای اضافه و خطا
      - name: Build APK
        run: flet build apk --project "MyIliyaApp"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/app-release.apk
