name: Build and Secure Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ۱. نصب پیش‌نیازها
      - name: Install Dependencies
        run: |
          pip install flet flet-build bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ۲. اسکن امنیتی (برای اطمینان از امنیت کدهات)
      - name: Security Scan with Bandit
        run: |
          echo "Running Security Scan..."
          bandit -r . -ll

      # ۳. آماده‌سازی محیط اندروید
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # ۴. بیلد گرفتن (چون main.py در ریشه است، آدرس مستقیم نمی‌خواد)
      - name: Build APK
        run: flet build apk --project "MyIliyaApp"

      # ۵. آپلود خروجی
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/app-release.apk
