steps:
  - name: Checkout code
    uses: actions/checkout@v6    # از v4 به v6 تغییر داده شد[reference:5][reference:6]

  - name: Setup Python
    uses: actions/setup-python@v6    # از v5 به v6 تغییر داده شد[reference:7]

  - name: Install Flet and Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install flet
      if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

  - name: Setup Java JDK
    uses: actions/setup-java@v5    # از v4 به v5 تغییر داده شد[reference:8]

  - name: Build APK
    run: flet build apk --verbose

  - name: Upload APK
    uses: actions/upload-artifact@v6    # از v4 به v6 تغییر داده شد[reference:9]
    with:
      name: my-flet-app-apk
      path: build/apk
